<div class="modal-overlay" id="mo">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Product</div>
    <div class="field"><label>Serial Key</label><input id="ms" placeholder="TK-0001"></div>
    <div class="field"><label>Item Name</label><input id="mn" placeholder="Polo Shirt"></div>
    <div class="field"><label>Brand</label><input id="mb" placeholder="Ralph Lauren"></div>
    <div class="field"><label>Category</label><select id="mc"><option>Polos</option><option>T-Shirts</option><option>Denim</option><option>Hoodies</option><option>Sweatshirts</option><option>Sportswear</option><option>Workwear</option><option>Jackets</option><option>Shorts</option><option>Shirts</option><option>Sweaters</option><option>Fleeces</option><option>Accessories</option><option>Other</option></select></div>
    <div class="field">
      <label>Size Type</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
        <button type="button" id="mBtnTop" onclick="mSizeType('top')" style="padding:10px;border-radius:8px;border:1px solid var(--red);background:#1f0000;color:#f87171;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">TOP SIZE<br><span style="font-size:10px;font-weight:400;color:#f87171aa">XS / S / M / L...</span></button>
        <button type="button" id="mBtnBtm" onclick="mSizeType('btm')" style="padding:10px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">BOTTOM SIZE<br><span style="font-size:10px;font-weight:400">26 / 28 / 30...</span></button>
      </div>
    </div>
    <div id="mTopWrap" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px">
      <div class="field"><label>From</label><select id="mtf"><option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option><option>XXXL</option><option>One Size</option></select></div>
      <div class="field"><label>To</label><select id="mtt"><option>XS</option><option>S</option><option>M</option><option>L</option><option>XL</option><option>XXL</option><option>XXXL</option><option>One Size</option></select></div>
    </div>
    <div id="mBtmWrap" style="display:none;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px">
      <div class="field"><label>Waist From</label><select id="mbf"><option>26</option><option>27</option><option>28</option><option>29</option><option>30</option><option>31</option><option>32</option><option>33</option><option>34</option><option>35</option><option>36</option><option>37</option><option>38</option><option>39</option><option>40</option><option>41</option><option>42</option></select></div>
      <div class="field"><label>Waist To</label><select id="mbt"><option>26</option><option>27</option><option>28</option><option>29</option><option>30</option><option>31</option><option>32</option><option>33</option><option>34</option><option>35</option><option>36</option><option>37</option><option>38</option><option>39</option><option>40</option><option>41</option><option>42</option></select></div>
    </div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeM()">Cancel</button><button class="btn-save" onclick="saveE()">Save</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script src="shared.js"></script>
<script>
// Supabase loaded from shared.js

function showToast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.style.background=err?'#1f0000':'#001a0a';t.style.borderColor=err?'#dc2626':'#16a34a';t.style.color=err?'#f87171':'#4ade80';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function initRole(){const r=getRole(),b=document.getElementById('roleBadge');if(r==='admin'){b.textContent='Admin';b.className='role-badge';}else if(r==='media'){b.textContent='Media';b.className='role-badge media';}else{b.textContent='Viewing';b.className='role-badge customer';}}

let all=[],eid=null;
function toggleForm(){const f=document.getElementById('qf');f.style.display=f.style.display==='none'?'block':'none';}
async function init(){
  showLoader();
  initRole();
  if(canEdit()){document.getElementById('addBtn').style.display='flex';document.getElementById('qf').style.display='block';}
  all=await sbGet('media_items');
  document.getElementById('msg').style.display='none';document.getElementById('list').style.display='';renderG();
  hideLoader();
}
function fmtDate(iso){if(!iso)return'Unknown';const d=new Date(iso);return d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});}
function renderG(){
  const q=document.getElementById('si').value.toLowerCase();
  const df=document.getElementById('df').value;
  let d=[...all];
  if(q)d=d.filter(x=>(x.serial+x.name+x.brand+x.category).toLowerCase().includes(q));
  if(df)d=d.filter(x=>x.created_at&&x.created_at.startsWith(df));
  const el=document.getElementById('list');
  if(!d.length){el.innerHTML='<div class="empty">No products found</div>';return;}
  const grp={};
  d.forEach(x=>{const k=x.created_at?x.created_at.slice(0,10):'unknown';if(!grp[k])grp[k]=[];grp[k].push(x);});
  const keys=Object.keys(grp).sort((a,b)=>b.localeCompare(a));
  el.innerHTML=keys.map(k=>{
    const items=grp[k];
    const lbl=k==='unknown'?'Unknown Date':fmtDate(items[0].created_at);
    const rows=items.map((x,i)=>`<div class="item-card" style="border-radius:8px;margin-bottom:8px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">Item ${i+1}</div>
          <div class="item-name" style="font-size:13px">${x.name}</div>
          <div style="font-size:12px;color:var(--muted)">${x.brand||''}</div>
        </div>
        <span class="chip red" style="font-size:10px;white-space:nowrap">${x.serial||'-'}</span>
      </div>
      <div class="item-meta" style="margin-top:8px">
        <span class="chip">${x.category}</span>
        ${x.top_size_from?`<span class="chip blue">Top: ${x.top_size_from}–${x.top_size_to}</span>`:''}
        ${x.btm_size_from?`<span class="chip green">W: ${x.btm_size_from}–${x.btm_size_to}</span>`:''}
      </div>
      ${canEdit()?`<div class="act-row"><button class="btn-edit" onclick="openModal('${x.id}')">Edit</button><button class="btn-del" onclick="del('${x.id}')">Delete</button></div>`:''}
    </div>`).join('');
    return `<div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <div style="flex:1;height:1px;background:var(--border)"></div>
        <div style="font-size:11px;font-weight:600;color:var(--red-light);white-space:nowrap">${lbl} <span style="color:var(--muted);font-weight:400">(${items.length} item${items.length!==1?'s':''})</span></div>
        <div style="flex:1;height:1px;background:var(--border)"></div>
      </div>${rows}</div>`;
  }).join('');
}

function qSizeType(t){
  const isTop=t==='top';
  document.getElementById('qTopWrap').style.display=isTop?'grid':'none';
  document.getElementById('qBtmWrap').style.display=isTop?'none':'grid';
  document.getElementById('qBtnTop').style.cssText=isTop?'padding:10px;border-radius:8px;border:1px solid var(--red);background:#1f0000;color:#f87171;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit':'padding:10px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit';
  document.getElementById('qBtnBtm').style.cssText=isTop?'padding:10px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit':'padding:10px;border-radius:8px;border:1px solid var(--red);background:#1f0000;color:#f87171;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit';
  document.getElementById('qBtnTop').querySelector('span').style.color=isTop?'#f87171aa':'';
  document.getElementById('qBtnBtm').querySelector('span').style.color=isTop?'':'#f87171aa';
}
function mSizeType(t){
  const isTop=t==='top';
  document.getElementById('mTopWrap').style.display=isTop?'grid':'none';
  document.getElementById('mBtmWrap').style.display=isTop?'none':'grid';
  document.getElementById('mBtnTop').style.cssText=isTop?'padding:10px;border-radius:8px;border:1px solid var(--red);background:#1f0000;color:#f87171;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit':'padding:10px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit';
  document.getElementById('mBtnBtm').style.cssText=isTop?'padding:10px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit':'padding:10px;border-radius:8px;border:1px solid var(--red);background:#1f0000;color:#f87171;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit';
}
async function quickAdd(){
  const name=document.getElementById('qn').value.trim();
  if(!name){showToast('Name required',true);return;}
  const isBtm=document.getElementById('qBtmWrap').style.display==='grid';
  const p={serial:document.getElementById('qs').value.trim(),name,brand:document.getElementById('qb').value.trim(),category:document.getElementById('qc').value,
    top_size_from:isBtm?null:document.getElementById('qtf').value,
    top_size_to:isBtm?null:document.getElementById('qtt').value,
    btm_size_from:isBtm?document.getElementById('qbf').value:null,
    btm_size_to:isBtm?document.getElementById('qbt').value:null};
  const btn=document.querySelector('#qf .btn-save');btn.textContent='...';btn.disabled=true;
  const res=await sbInsert('media_items',p);
  btn.textContent='Add Item';btn.disabled=false;
  if(res){document.getElementById('qs').value='';document.getElementById('qn').value='';document.getElementById('qb').value='';showToast('Added!');all=await sbGet('media_items');renderG();}
  else showToast('Error!',true);
}
function openModal(id){
  eid=id;const x=all.find(a=>a.id==id)||{};
  document.getElementById('ms').value=x.serial||'';document.getElementById('mn').value=x.name||'';
  document.getElementById('mb').value=x.brand||'';document.getElementById('mc').value=x.category||'Polos';
  const hasBtm=x.btm_size_from&&!x.top_size_from;
  mSizeType(hasBtm?'btm':'top');
  if(!hasBtm){document.getElementById('mtf').value=x.top_size_from||'XS';document.getElementById('mtt').value=x.top_size_to||'XXL';}
  else{document.getElementById('mbf').value=x.btm_size_from||'26';document.getElementById('mbt').value=x.btm_size_to||'38';}
  document.getElementById('mo').classList.add('open');
}
function closeM(){document.getElementById('mo').classList.remove('open');eid=null;}
async function saveE(){
  const name=document.getElementById('mn').value.trim();if(!name){showToast('Name required',true);return;}
  const mIsBtm=document.getElementById('mBtmWrap').style.display==='grid';
  const p={serial:document.getElementById('ms').value.trim(),name,brand:document.getElementById('mb').value.trim(),category:document.getElementById('mc').value,
    top_size_from:mIsBtm?null:document.getElementById('mtf').value,
    top_size_to:mIsBtm?null:document.getElementById('mtt').value,
    btm_size_from:mIsBtm?document.getElementById('mbf').value:null,
    btm_size_to:mIsBtm?document.getElementById('mbt').value:null};
  await sbUpdate('media_items',eid,p);showToast('Updated!');closeM();all=await sbGet('media_items');renderG();
}
async function del(id){
  if(!confirm('Delete?'))return;await sbDelete('media_items',id);showToast('Deleted');all=await sbGet('media_items');renderG();
}
function dlCSV(){
  const rows=[['Date','Serial','Name','Brand','Category','Top From','Top To','Waist From','Waist To'],...all.map(x=>[x.created_at?x.created_at.slice(0,10):'',x.serial||'',x.name||'',x.brand||'',x.category||'',x.top_size_from||'',x.top_size_to||'',x.btm_size_from||'',x.btm_size_to||''])];
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='tk_media_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
document.getElementById('mo').addEventListener('click',e=>{if(e.target===e.currentTarget)closeM();});
init();
</script></body></html>
